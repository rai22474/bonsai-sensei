global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bonsai_sensei
    static_configs:
      - targets: ['sensei:8080']
    metrics_path: /metrics

  - job_name: knowledge_base
    static_configs:
      - targets: ['knowledge_base:8080']
    metrics_path: /metrics

  - job_name: episodic_memory
    static_configs:
      - targets: ['episodic-memory:8080']
    metrics_path: /metrics

  - job_name: falkordb
    static_configs:
      - targets: ['falkordb-exporter:9121']
    metrics_path: /metrics
