global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bonsai_sensei
    static_configs:
      - targets: ['sensei:8080']
    metrics_path: /metrics

  - job_name: knowledge_base
    static_configs:
      - targets: ['knowledge_base:8080']
    metrics_path: /metrics
