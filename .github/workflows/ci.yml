name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GOOGLE_API_KEY: "dummy_key_for_ci"
      TELEGRAM_BOT_TOKEN: "dummy_token_for_ci"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -m "not integration"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.WIF_PROVIDER != ''
    environment: dev

    permissions:
      contents: read
      id-token: write

    env:
      REGION: europe-west1
      REPOSITORY: bonsai-sensei

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPOSITORY }}/bonsai-sensei:${{ github.sha }}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    permissions:
      contents: read
      id-token: write

    env:
      REGION: europe-west1
      MIGRATION_JOB: bonsai-sensei-migrate

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Update migration job image
        run: |
          gcloud run jobs update ${{ env.MIGRATION_JOB }} \
            --image "${{ needs.build.outputs.image_uri }}" \
            --region ${{ env.REGION }} \
            --quiet

      - name: Run migration
        run: |
          gcloud run jobs execute ${{ env.MIGRATION_JOB }} \
            --region ${{ env.REGION }} \
            --wait

  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: dev

    permissions:
      contents: read
      id-token: write

    env:
      REGION: europe-west1
      SERVICE_NAME: bonsai-sensei-api

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ needs.build.outputs.image_uri }}" \
            --region ${{ env.REGION }} \
            --quiet
