version: '3.8'

services:
  sensei:
    build:
      context: .
      dockerfile: bonsai_sensei/Dockerfile
    ports:
      - "9050:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bonsai_user:bonsai_password@db:5432/bonsai_db
      - MODEL_PROVIDER=${MODEL_PROVIDER:-cloud}
      - KB_BASE_URL=http://knowledge_base:8080
      - PHOTOS_PATH=/app/photos
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - EPISODIC_MEMORY_URL=http://episodic-memory:8080
    volumes:
      - ./photos:/app/photos
    depends_on:
      db:
        condition: service_healthy
      episodic-memory:
        condition: service_healthy
      knowledge_base:
        condition: service_healthy
    command: sh -c "python init_db.py && uvicorn bonsai_sensei.main:app --host 0.0.0.0 --port 8080"

  knowledge_base:
    build:
      context: .
      dockerfile: knowledge_base/Dockerfile
    ports:
      - "9051:8080"
    env_file:
      - .env
    environment:
      - WIKI_PATH=/app/wiki
      - TRANSCRIPTS_PATH=/app/transcripts
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - EPISODIC_MEMORY_URL=http://episodic-memory:8080
    volumes:
      - ./wiki:/app/wiki
      - ./transcripts:/app/transcripts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      episodic-memory:
        condition: service_healthy

  episodic-memory:
    build:
      context: .
      dockerfile: episodic_memory/Dockerfile
    ports:
      - "9052:8080"
    env_file:
      - .env
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      falkordb:
        condition: service_healthy

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  falkordb-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://falkordb:6379
    depends_on:
      - falkordb

  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      - POSTGRES_USER=bonsai_user
      - POSTGRES_PASSWORD=bonsai_password
      - POSTGRES_DB=bonsai_db
    ports:
      - "9432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonsai_user -d bonsai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "9686:16686"
      - "9317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - sensei

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/bonsai_sensei.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
