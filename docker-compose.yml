version: '3.8'

services:
  sensei:
    build:
      context: .
      dockerfile: bonsai_sensei/Dockerfile
    ports:
      - "9050:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bonsai_user:bonsai_password@db:5432/bonsai_db
      - MODEL_PROVIDER=${MODEL_PROVIDER:-cloud}
      - KB_BASE_URL=http://knowledge_base:8080
      - PHOTOS_PATH=/app/photos
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - HONCHO_API_KEY=local
      - HONCHO_WORKSPACE_ID=${HONCHO_WORKSPACE_ID:-bonsai-sensei}
      - HONCHO_BASE_URL=http://honcho-api:8000
    volumes:
      - ./photos:/app/photos
    depends_on:
      db:
        condition: service_healthy
      honcho-api:
        condition: service_started
      knowledge_base:
        condition: service_healthy
    command: sh -c "python init_db.py && uvicorn bonsai_sensei.main:app --host 0.0.0.0 --port 8080"

  knowledge_base:
    build:
      context: .
      dockerfile: knowledge_base/Dockerfile
    ports:
      - "9051:8080"
    env_file:
      - .env
    environment:
      - WIKI_PATH=/app/wiki
      - TRANSCRIPTS_PATH=/app/transcripts
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - HONCHO_API_KEY=local
      - HONCHO_WORKSPACE_ID=${HONCHO_WORKSPACE_ID:-bonsai-sensei}
      - HONCHO_BASE_URL=http://honcho-api:8000
    volumes:
      - ./wiki:/app/wiki
      - ./transcripts:/app/transcripts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      honcho-api:
        condition: service_started

  honcho-api:
    build:
      context: https://github.com/plastic-labs/honcho.git
    command: sh docker/entrypoint.sh
    ports:
      - "9001:8000"
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://bonsai_user:bonsai_password@db:5432/honcho_db
      - REDIS_URL=redis://redis:6379
      - LLM_OPENAI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_OPENAI_API_BASE=https://generativelanguage.googleapis.com/v1beta/openai/
      - AUTH_USE_AUTH=false
      - CACHE_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  honcho-deriver:
    build:
      context: https://github.com/plastic-labs/honcho.git
    command: python -m src.deriver
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://bonsai_user:bonsai_password@db:5432/honcho_db
      - REDIS_URL=redis://redis:6379
      - LLM_OPENAI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_OPENAI_API_BASE=https://generativelanguage.googleapis.com/v1beta/openai/
      - AUTH_USE_AUTH=false
    depends_on:
      - honcho-api
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "9379:6379"

  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      - POSTGRES_USER=bonsai_user
      - POSTGRES_PASSWORD=bonsai_password
      - POSTGRES_DB=bonsai_db
    ports:
      - "9432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonsai_user -d bonsai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "9686:16686"
      - "9317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - sensei

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/bonsai_sensei.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
