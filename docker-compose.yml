version: '3.8'

services:
  app:
    build: .
    ports:
      - "8050:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bonsai_user:bonsai_password@db:5432/bonsai_db
      - MODEL_PROVIDER=${MODEL_PROVIDER:-cloud}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:32b-instruct}
      - WIKI_PATH=/app/wiki
      - PHOTOS_PATH=/app/photos
      - TRANSCRIPTS_PATH=/app/transcripts
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - ADK_CAPTURE_MESSAGE_CONTENT_IN_SPANS=true
    volumes:
      - ./wiki:/app/wiki
      - ./photos:/app/photos
      - ./transcripts:/app/transcripts
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    command: sh -c "python init_db.py && uvicorn bonsai_sensei.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=bonsai_user
      - POSTGRES_PASSWORD=bonsai_password
      - POSTGRES_DB=bonsai_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonsai_user -d bonsai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_GRPC_MAX_MESSAGE_SIZE=20971520

volumes:
  postgres_data:
